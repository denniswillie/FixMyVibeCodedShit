x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

x-common-service: &common-service
  restart: unless-stopped
  logging: *default-logging
  networks:
    - vibefix-net

services:
  caddy:
    <<: *common-service
    image: caddy:2.8.4-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      website-service:
        condition: service_started
    cpus: "0.10"
    mem_limit: "128m"
    mem_reservation: "64m"

  website-service:
    <<: *common-service
    build:
      context: .
      dockerfile: services/website-service/Dockerfile
    image: vibefix/website-service:ec2-local
    env_file:
      - ${VIBEFIX_ENV_FILE:-./.env}
    environment:
      NODE_ENV: production
      PORT: "8080"
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8080/healthz >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    cpus: "0.75"
    mem_limit: "1024m"
    mem_reservation: "512m"

networks:
  vibefix-net:
    name: vibefix-net

volumes:
  caddy_config:
  caddy_data:
